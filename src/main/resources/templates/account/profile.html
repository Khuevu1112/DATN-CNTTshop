<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Thông tin cá nhân</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: #f5f5f5;
    }

    .profile-card {
        background: white;
        border-radius: 15px;
        padding: 30px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    .avatar-box {
        text-align: center;
        border-right: 1px solid #eee;
    }

    .avatar-box img {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid #eee;
    }

    .avatar-box h5 {
        margin-top: 15px;
        font-weight: 700;
    }
</style>
</head>

<body>

<div class="container mt-5">

    <div class="profile-card">

        <h3 class="mb-4">
            Thông tin tài khoản
        </h3>

        <div th:if="${param.success}" class="alert alert-success">
            Cập nhật thông tin thành công!
        </div>

        <div class="row">

            <!-- AVATAR BÊN TRÁI -->
            <div class="col-md-4 avatar-box">

                <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
                     alt="Avatar">

                <h5 th:text="${user.hoTen}">
                    Tên người dùng
                </h5>

                <p class="text-muted" th:text="${user.email}">
                    email@gmail.com
                </p>

            </div>

            <!-- THÔNG TIN BÊN PHẢI -->
            <div class="col-md-8 ps-md-5">

                <form th:action="@{/account/profile}" method="post">

                    <div class="mb-3">
                        <label class="form-label">Họ tên</label>
                        <input type="text"
                               name="hoTen"
                               class="form-control"
                               th:value="${user.hoTen}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email"
                               class="form-control"
                               th:value="${user.email}"
                               readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Số điện thoại</label>
                        <input type="text"
                               name="soDienThoai"
                               class="form-control"
                               th:value="${user.soDienThoai}">
                    </div>

                    

                    <button class="btn btn-primary">
                        Cập nhật thông tin
                    </button>

                    <a th:href="@{/}" class="btn btn-secondary">
                        Về trang chủ
                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
