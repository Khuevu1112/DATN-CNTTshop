<div class="bg-white p-4 rounded shadow-sm">

<div class="row justify-content-center">
<div class="col-md-7">

    <h4 class="fw-bold mb-4" th:text="${title}"></h4>

    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <form th:action="${address.id == null}
                              ? @{/account/addresses/new(returnUrl=${returnUrl})}
                              : @{/account/addresses/{id}/edit(id=${address.id},returnUrl=${returnUrl})}"
                  method="post">

                <input type="hidden" name="returnUrl" th:value="${returnUrl}">

                <div class="mb-3">
                    <label class="form-label">Họ tên người nhận *</label>
                    <input type="text" name="tenNguoiNhan" class="form-control" required
                           th:value="${address.tenNguoiNhan}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Số điện thoại *</label>
                    <input type="tel" name="soDienThoai" class="form-control" required
                           th:value="${address.soDienThoai}">
                </div>

                <div class="row g-2 mb-3">
                    <div class="col-md-4">
                        <label class="form-label">Tỉnh/Thành *</label>
                        <input type="text" name="tinhThanh" class="form-control" required
                               th:value="${address.tinhThanh}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Quận/Huyện *</label>
                        <input type="text" name="quanHuyen" class="form-control" required
                               th:value="${address.quanHuyen}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Phường/Xã *</label>
                        <input type="text" name="phuongXa" class="form-control" required
                               th:value="${address.phuongXa}">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Địa chỉ cụ thể *</label>
                    <input type="text" name="diaChiCuThe" class="form-control" required
                           th:value="${address.diaChiCuThe}"
                           placeholder="Số nhà, tên đường...">
                </div>

                <div class="form-check mb-4">
                    <input type="checkbox" name="isDefault" value="true"
                           class="form-check-input" id="isDefault"
                           th:checked="${address.isDefault}">
                    <label class="form-check-label" for="isDefault">
                        Đặt làm địa chỉ mặc định
                    </label>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-danger">Lưu</button>
                    <a th:href="${returnUrl != null and !returnUrl.isEmpty()} ? ${returnUrl} : @{/account/addresses}"
                       class="btn btn-outline-secondary">Hủy</a>
                </div>
            </form>
        </div>
    </div>

</div>
</div>

</div>
