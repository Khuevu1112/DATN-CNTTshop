<div class="bg-white p-4 rounded shadow-sm">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">
        <i class="bi bi-geo-alt me-2 text-danger"></i>Sổ địa chỉ
    </h4>
    <a th:href="@{/account/addresses/new}" class="btn btn-danger">
        <i class="bi bi-plus-lg me-1"></i>Thêm địa chỉ
    </a>
</div>

<div th:if="${success}" class="alert alert-success alert-dismissible fade show">
    <span th:text="${success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
<div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

<div th:if="${addresses.isEmpty()}" class="text-center py-5 text-muted">
    Bạn chưa có địa chỉ nào, hãy thêm mới
</div>

<div class="row g-3">
    <div class="col-md-6" th:each="addr : ${addresses}">
        <div class="card border-0 shadow-sm h-100"
             th:classappend="${addr.isDefault} ? 'border border-danger' : ''">
            <div class="card-body">
                <div class="d-flex justify-content-between">
                    <h6 class="fw-bold" th:text="${addr.tenNguoiNhan}"></h6>
                    <span th:if="${addr.isDefault}" class="badge bg-danger">Mặc định</span>
                </div>
                <p class="mb-1 text-muted" th:text="${addr.soDienThoai}"></p>
                <p class="mb-3" th:text="${addr.diaChiDayDu}"></p>

                <div class="d-flex gap-2 flex-wrap">
                    <a th:href="@{/account/addresses/{id}/edit(id=${addr.id})}"
                       class="btn btn-sm btn-outline-secondary">Sửa</a>

                    <form th:if="${!addr.isDefault}"
                          th:action="@{/account/addresses/{id}/set-default(id=${addr.id})}"
                          method="post" class="d-inline">
                        <button type="submit" class="btn btn-sm btn-outline-danger">
                            Đặt làm mặc định
                        </button>
                    </form>

                    <form th:action="@{/account/addresses/{id}/delete(id=${addr.id})}"
                          method="post" class="d-inline"
                          onsubmit="return confirm('Xóa địa chỉ này?')">
                        <button type="submit" class="btn btn-sm btn-outline-secondary">Xóa</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</div>
