<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Quản lý sản phẩm</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-3">
        <h3>Quản lý sản phẩm</h3>

        <div>
            <a th:href="@{/}" class="btn btn-secondary">Trang chủ</a>
            <a th:href="@{/admin/products/add}" class="btn btn-primary">Thêm sản phẩm</a>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <table class="table table-bordered bg-white shadow-sm">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Tên sản phẩm</th>
                <th>Slug</th>
                <th>Danh mục</th>
                <th>Trạng thái</th>
                <th>Ngày tạo</th>
                <th>Thao tác</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="p : ${products}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.name}"></td>
                <td th:text="${p.slug}"></td>
                <td th:text="${p.category != null ? p.category.name : 'Chưa có'}"></td>

                <td>
                    <span th:if="${p.isActive}" class="badge bg-success">Hiển thị</span>
                    <span th:if="${!p.isActive}" class="badge bg-danger">Ẩn</span>
                </td>

                <td th:text="${p.createdAt}"></td>

                <td>
                    <a th:href="@{/admin/products/edit/{id}(id=${p.id})}"
                       class="btn btn-warning btn-sm">
                        Sửa
                    </a>

                    <a th:href="@{/admin/products/delete/{id}(id=${p.id})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Bạn có chắc muốn xóa?')">
                        Xóa
                    </a>
                </td>
            </tr>
        </tbody>
    </table>

</div>

</body>
</html>
