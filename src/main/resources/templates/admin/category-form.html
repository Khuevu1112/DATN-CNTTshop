<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Danh mục</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4>Thông tin danh mục</h4>
        </div>

        <div class="card-body">

            <form th:action="@{/admin/categories/save}" method="post" th:object="${category}">

                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label">Tên danh mục</label>
                    <input type="text" th:field="*{name}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Slug</label>
                    <input type="text" th:field="*{slug}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Link ảnh</label>
                    <input type="text" th:field="*{imageUrl}" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Thứ tự</label>
                    <input type="number" th:field="*{sortOrder}" class="form-control">
                </div>

                <button class="btn btn-primary">Lưu</button>
                <a th:href="@{/admin/categories}" class="btn btn-secondary">Quay lại</a>

            </form>

        </div>
    </div>

</div>

</body>
</html>
