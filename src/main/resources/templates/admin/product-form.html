<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Sản phẩm</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4>Thông tin sản phẩm</h4>
        </div>

        <div class="card-body">

            <form th:action="@{/admin/products/save}" method="post" th:object="${product}">

                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{createdAt}">

                <div class="mb-3">
                    <label class="form-label">Tên sản phẩm</label>
                    <input type="text" th:field="*{name}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Slug</label>
                    <input type="text" th:field="*{slug}" class="form-control" required>
                </div>


<div class="mb-3">
    <label class="form-label">Giá bán</label>
    <input type="number"
           name="price"
           class="form-control"
           placeholder="Nhập giá bán"
           required>
</div>

<div class="mb-3">
    <label class="form-label">Giá gốc</label>
    <input type="number"
           name="originalPrice"
           class="form-control"
           placeholder="Nhập giá gốc">
</div>

<div class="mb-3">
    <label class="form-label">Số lượng tồn kho</label>
    <input type="number"
           name="stock"
           class="form-control"
           value="1"
           min="0"
           required>
</div>

                <div class="mb-3">
                    <label class="form-label">Danh mục</label>

                    <select th:field="*{category.id}" class="form-select" required>
                        <option value="">-- Chọn danh mục --</option>
                        <option th:each="c : ${categories}"
                                th:value="${c.id}"
                                th:text="${c.name}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Mô tả</label>
                    <textarea th:field="*{description}"
                              class="form-control"
                              rows="5">
                    </textarea>
                </div>

                <div class="form-check mb-3">
                    <input type="checkbox"
                           th:field="*{isActive}"
                           class="form-check-input">

                    <label class="form-check-label">
                        Hiển thị sản phẩm
                    </label>
                </div>

                <button class="btn btn-primary">Lưu</button>
                <a th:href="@{/admin/products}" class="btn btn-secondary">Quay lại</a>

            </form>

        </div>
    </div>

</div>

</body>
</html>
