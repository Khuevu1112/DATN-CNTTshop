<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Sản phẩm theo danh mục</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>
            Sản phẩm trong danh mục:
            <span class="text-primary" th:text="${category.name}"></span>
        </h2>

        <div>
            <a th:href="@{/admin/categories}" class="btn btn-secondary">
                Quay lại danh mục
            </a>

            <a th:href="@{/admin/products/add}" class="btn btn-primary">
                Thêm sản phẩm
            </a>
        </div>

    </div>

    <table class="table table-bordered table-hover bg-white shadow-sm">

        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Tên sản phẩm</th>
                <th>Slug</th>
                <th>Danh mục</th>
                <th>Trạng thái</th>
                <th>Ngày tạo</th>
                <th width="180">Thao tác</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="p : ${products}">

                <td th:text="${p.id}"></td>

                <td th:text="${p.name}"></td>

                <td th:text="${p.slug}"></td>

                <td th:text="${p.category.name}"></td>

                <td>
                    <span th:if="${p.isActive}" class="badge bg-success">
                        Hiện
                    </span>

                    <span th:if="${!p.isActive}" class="badge bg-danger">
                        Ẩn
                    </span>
                </td>

                <td th:text="${p.createdAt}"></td>

                <td>
                    <a th:href="@{/admin/products/edit/{id}(id=${p.id})}"
                       class="btn btn-warning btn-sm">
                        Sửa
                    </a>

                    <a th:href="@{/admin/products/delete/{id}(id=${p.id})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Bạn có chắc muốn xóa sản phẩm này?')">
                        Xóa
                    </a>
                </td>

            </tr>
        </tbody>

    </table>

    <div th:if="${products == null or products.isEmpty()}"
         class="alert alert-warning text-center">
        Danh mục này chưa có sản phẩm.
    </div>

</div>

</body>
</html>
