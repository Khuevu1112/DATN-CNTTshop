<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Sửa tài khoản</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-dark text-white">
            <h4>Sửa tài khoản người dùng</h4>
        </div>

        <div class="card-body">

            <form th:action="@{/admin/users/save}"
                  method="post"
                  th:object="${user}">

                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label">Họ tên</label>
                    <input type="text"
                           th:field="*{hoTen}"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email"
                           th:field="*{email}"
                           class="form-control"
                           readonly>
                </div>

                <div class="mb-3">
                    <label class="form-label">Số điện thoại</label>
                    <input type="text"
                           th:field="*{soDienThoai}"
                           class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Vai trò</label>

                    <select th:field="*{vaiTro}" class="form-select">
                        <option th:each="r : ${roles}"
                                th:value="${r}"
                                th:text="${r}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Trạng thái</label>

                    <select th:field="*{isActive}" class="form-select">
                        <option th:value="true">Hoạt động</option>
                        <option th:value="false">Khóa tài khoản</option>
                    </select>
                </div>

                <button class="btn btn-primary">
                    Lưu thay đổi
                </button>

                <a th:href="@{/admin/users}" class="btn btn-secondary">
                    Quay lại
                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
