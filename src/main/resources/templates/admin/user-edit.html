<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Sửa tài khoản</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-header bg-warning">
            <h4>Sửa tài khoản người dùng</h4>
        </div>

        <div class="card-body">

           <form th:action="@{/admin/users/update}" method="post">

    <input type="hidden" name="id" th:value="${user.id}">

    <div class="mb-3">
        <label class="form-label">Họ tên</label>
        <input type="text"
               name="hoTen"
               class="form-control"
               th:value="${user.hoTen}"
               required>
    </div>

    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email"
               name="email"
               class="form-control"
               th:value="${user.email}"
               readonly>
    </div>

    <div class="mb-3">
        <label class="form-label">Số điện thoại</label>
        <input type="text"
               name="soDienThoai"
               class="form-control"
               th:value="${user.soDienThoai}">
    </div>

    <div class="mb-3">
        <label class="form-label">Vai trò</label>

        <select name="vaiTro" class="form-select">
            <option value="admin"
                    th:selected="${user.vaiTro.name() == 'admin'}">
                admin
            </option>
<option value="staff"
            th:selected="${user.vaiTro.name() == 'staff'}">
        staff
    </option>
            <option value="customer"
                    th:selected="${user.vaiTro.name() == 'customer'}">
                user
            </option>
        </select>
    </div>

    <div class="form-check mb-3">
        <input class="form-check-input"
               type="checkbox"
               name="isActive"
               value="true"
               th:checked="${user.isActive}">

        <label class="form-check-label">
            Tài khoản hoạt động
        </label>
    </div>

    <button class="btn btn-primary">
        Lưu thay đổi
    </button>

    <a th:href="@{/admin/users}" class="btn btn-secondary">
        Quay lại
    </a>

</form>

        </div>
    </div>

</div>

</body>
</html>
