<div class="bg-white p-4 rounded shadow-sm">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">
            <i class="bi bi-cart-check me-2 text-danger"></i>Quản lý giỏ hàng
        </h4>
        <span class="text-muted small" th:text="'Tổng: ' + ${items.size()} + ' dòng sản phẩm'"></span>
    </div>

    <div th:if="${items.isEmpty()}" class="text-center py-5 text-muted">
        Chưa có sản phẩm nào được khách đặt.
    </div>

    <div class="card border-0 shadow-sm" th:if="${!items.isEmpty()}">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th style="width:70px">STT</th>
                        <th>Mã đơn</th>
                        <th>Khách hàng</th>
                        <th>Tên sản phẩm</th>
                        <th class="text-center" style="width:120px">Số lượng</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="it, stat : ${items}">
                        <td th:text="${stat.count}">1</td>
                        <td class="fw-semibold" th:text="${it.order.maDonHang}"></td>
                        <td th:text="${it.order.nguoiDung.hoTen}"></td>
                        <td th:text="${it.tenSanPham}"></td>
                        <td class="text-center fw-bold text-danger" th:text="${it.soLuong}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
