<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Quản lý tài khoản</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Quản lý tài khoản người dùng</h3>

        <a th:href="@{/}" class="btn btn-secondary">
            Về trang chủ
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <table class="table table-bordered table-hover bg-white shadow-sm">

        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Họ tên</th>
                <th>Email</th>
                <th>Số điện thoại</th>
                <th>Vai trò</th>
                <th>Trạng thái</th>
                <th>Ngày tạo</th>
                <th width="180">Thao tác</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="u : ${users}">

                <td th:text="${u.id}"></td>

                <td th:text="${u.hoTen}"></td>

                <td th:text="${u.email}"></td>

                <td th:text="${u.soDienThoai}"></td>

                <td>
                    <span class="badge bg-primary"
                          th:text="${u.vaiTro}">
                    </span>
                </td>

                <td>
                    <span th:if="${u.isActive}" class="badge bg-success">
                        Hoạt động
                    </span>

                    <span th:if="${!u.isActive}" class="badge bg-danger">
                        Đã khóa
                    </span>
                </td>

                <td th:text="${u.createdAt}"></td>

                <td>
                    <a th:href="@{/admin/users/edit/{id}(id=${u.id})}"
                       class="btn btn-warning btn-sm">
                        Sửa
                    </a>

                    <a th:href="@{/admin/users/delete/{id}(id=${u.id})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Bạn có chắc muốn xóa tài khoản này?')">
                        Xóa
                    </a>
                </td>

            </tr>
        </tbody>

    </table>

</div>

</body>
</html>
