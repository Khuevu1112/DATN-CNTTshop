<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Quản lý danh mục</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Quản lý danh mục</h2>

        <div>
            <a th:href="@{/}" class="btn btn-secondary">
                Trang chủ
            </a>

            <a th:href="@{/admin/categories/add}" class="btn btn-primary">
                Thêm danh mục
            </a>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <table class="table table-bordered table-hover bg-white shadow-sm">

        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Tên danh mục</th>
                <th>Slug</th>
                <th>Ảnh</th>
                <th>Thứ tự</th>
                <th width="320">Thao tác</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="c : ${categories}">

                <td th:text="${c.id}"></td>

                <td th:text="${c.name}"></td>

                <td th:text="${c.slug}"></td>

                <td>
                    <img th:if="${c.imageUrl != null}"
                         th:src="${c.imageUrl}"
                         style="width:60px;height:60px;object-fit:contain;">
                </td>

                <td th:text="${c.sortOrder}"></td>

                <td>
                    <a th:href="@{/admin/categories/{id}/products(id=${c.id})}"
                       class="btn btn-info btn-sm text-white">
                        Xem sản phẩm
                    </a>

                    <a th:href="@{/admin/categories/edit/{id}(id=${c.id})}"
                       class="btn btn-warning btn-sm">
                        Sửa
                    </a>

                    <a th:href="@{/admin/categories/delete/{id}(id=${c.id})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Bạn có chắc muốn xóa danh mục này?')">
                        Xóa
                    </a>
                </td>

            </tr>
        </tbody>

    </table>

</div>

</body>
</html>
