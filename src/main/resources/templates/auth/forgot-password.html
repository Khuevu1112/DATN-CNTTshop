<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Quên mật khẩu</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
    margin:0;
    padding:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff6a00,#ff007f);
    font-family:Arial,sans-serif;
}

.forgot-box{
    width:100%;
    max-width:650px;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.2);
}

.title{
    text-align:center;
    font-size:40px;
    font-weight:700;
    margin-bottom:30px;
}

.form-control{
    height:55px;
    border-radius:8px;
    font-size:18px;
}

.password-box{
    position:relative;
}

.password-box i{
    position:absolute;
    top:50%;
    right:20px;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:22px;
    color:#666;
}

.btn-reset{
    height:55px;
    border:none;
    border-radius:8px;
    font-size:20px;
    font-weight:600;
    color:white;
    background:linear-gradient(to right,#8e2de2,#4facfe);
}

.btn-reset:hover{
    opacity:.9;
}

.login-link{
    text-align:center;
    margin-top:20px;
}

.login-link a{
    text-decoration:none;
    color:#00c896;
    font-weight:600;
}

</style>

</head>
<body>

<div class="forgot-box">

    <h2 class="title">
        Quên mật khẩu
    </h2>

    <!-- Error -->
    <div th:if="${error}"
         class="alert alert-danger"
         th:text="${error}">
    </div>

    <!-- Success -->
    <div th:if="${success}"
         class="alert alert-success"
         th:text="${success}">
    </div>

    <form th:action="@{/DustNovel/forgot-password}"
          method="post">

        <!-- EMAIL -->
        <div class="mb-3">

            <input type="email"
                   name="email"
                   class="form-control"
                   placeholder="Nhập email tài khoản"
                   required>

        </div>

        <!-- PASSWORD MỚI -->
        <div class="mb-3 password-box">

            <input type="password"
                   id="newPassword"
                   name="matKhauMoi"
                   class="form-control"
                   placeholder="Mật khẩu mới"
                   required>

            <i class="bi bi-eye"
               onclick="togglePassword('newPassword',this)">
            </i>

        </div>

        <!-- NHẬP LẠI -->
        <div class="mb-4 password-box">

            <input type="password"
                   id="confirmPassword"
                   name="nhapLaiMatKhau"
                   class="form-control"
                   placeholder="Nhập lại mật khẩu mới"
                   required>

            <i class="bi bi-eye"
               onclick="togglePassword('confirmPassword',this)">
            </i>

        </div>

        <div class="d-grid">

            <button type="submit"
                    class="btn-reset">

                Đổi mật khẩu

            </button>

        </div>

    </form>

    <div class="login-link">

        Quay lại ?

        <a th:href="@{/DustNovel/login}">
            Đăng nhập
        </a>

    </div>

</div>

<script>

function togglePassword(id, icon){

    let input =
        document.getElementById(id);

    if(input.type === "password"){

        input.type = "text";

        icon.classList.remove("bi-eye");
        icon.classList.add("bi-eye-slash");

    }else{

        input.type = "password";

        icon.classList.remove("bi-eye-slash");
        icon.classList.add("bi-eye");
    }
}

</script>

</body>
</html>
