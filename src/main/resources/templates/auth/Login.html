<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Đăng nhập</title>

<!-- Bootstrap 5 -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
body {
	margin: 0;
	padding: 0;
	height: 100vh;
	background: linear-gradient(135deg, #ff6a00, #ff007f);
	display: flex;
	justify-content: center;
	align-items: center;
	font-family: Arial, sans-serif;
}

.login-box {
	width: 100%;
	max-width: 600px;
	background: #fff;
	padding: 40px;
	border-radius: 10px;
	box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
}

.login-title {
	text-align: center;
	font-size: 32px;
	font-weight: 600;
	margin-bottom: 35px;
	color: #444;
}

.form-control {
	height: 55px;
	font-size: 18px;
	border-radius: 5px;
}

.password-box {
	position: relative;
}

.password-box i {
	position: absolute;
	top: 50%;
	right: 15px;
	transform: translateY(-50%);
	font-size: 22px;
	color: #666;
	cursor: pointer;
}

.btn-login {
	height: 55px;
	border: none;
	border-radius: 5px;
	font-size: 20px;
	font-weight: 600;
	color: #fff;
	background: linear-gradient(to right, #8e2de2, #4facfe);
	transition: 0.3s;
}

.btn-login:hover {
	opacity: 0.9;
}

.register-link {
	text-align: center;
	margin-top: 25px;
	font-size: 16px;
}

.register-link a {
	color: #00c896;
	text-decoration: none;
	font-weight: 600;
}

.forgot {
	text-align: right;
	margin-top: 10px;
	margin-bottom: 20px;
}

.forgot a {
	text-decoration: none;
	color: #666;
}
</style>

</head>
<body>

	<div class="login-box">

		<h2 class="login-title">ĐĂNG NHẬP TÀI KHOẢN</h2>

		<form th:action="@{/DustNovel/login}" method="post">
			<!-- EMAIL -->
			<div class="mb-4">
				<input type="text"
       name="username"
       class="form-control"
       placeholder="Email hoặc số điện thoại"
       required>
			</div>

			<!-- PASSWORD -->
			<div class="mb-3 password-box">

				<input type="password" name="password" id="password"
					class="form-control" placeholder="Mật khẩu"> <i
					class="bi bi-eye" onclick="togglePassword()"></i>

			</div>

			<!-- QUÊN MẬT KHẨU -->
			<div class="forgot">
				<a th:href="@{/DustNovel/forgot-password}"> Quên mật khẩu? </a>
			</div>

			<!-- BUTTON -->
			<div class="d-grid">
				<button type="submit" class="btn-login">Đăng Nhập</button>
			</div>

		</form>
		
		<!-- ERROR LOGIN -->
		<div th:if="${param.error}"
     class="alert alert-danger text-center mt-3">
    Sai email/số điện thoại hoặc mật khẩu
</div>

		<!-- SUCCESS REGISTER -->
		<div th:if="${success}" class="alert alert-success text-center mt-3"
			th:text="${success}"></div>

		<!-- REGISTER -->
		<div class="register-link">
			Bạn chưa có tài khoản ? <a th:href="@{/DustNovel/register}"> Đăng
				Ký Ngay </a>
		</div>

	</div>

	<script>
		function togglePassword() {

			const password = document.getElementById("password");

			if (password.type === "password") {
				password.type = "text";
			} else {
				password.type = "password";
			}
		}
	</script>

</body>
</html>
