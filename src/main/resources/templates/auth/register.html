<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Đăng ký</title>

<!-- Bootstrap 5 -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

	body{
		margin:0;
		padding:0;
		height:100vh;
		background: linear-gradient(135deg,#ff6a00,#ff007f);
		display:flex;
		justify-content:center;
		align-items:center;
		font-family: Arial, sans-serif;
	}

	.register-box{
		width:100%;
		max-width:650px;
		background:#fff;
		padding:40px;
		border-radius:12px;
		box-shadow:0 5px 20px rgba(0,0,0,0.2);
	}

	.register-title{
		text-align:center;
		font-size:32px;
		font-weight:700;
		margin-bottom:35px;
		color:#444;
	}

	.form-control{
		height:55px;
		font-size:17px;
		border-radius:8px;
	}

	.password-box{
		position:relative;
	}

	.password-box i{
		position:absolute;
		top:50%;
		right:18px;
		transform:translateY(-50%);
		font-size:22px;
		color:#666;
		cursor:pointer;
	}

	.btn-register{
		height:55px;
		border:none;
		border-radius:8px;
		font-size:20px;
		font-weight:600;
		color:#fff;
		background: linear-gradient(to right,#8e2de2,#4facfe);
		transition:0.3s;
	}

	.btn-register:hover{
		opacity:0.9;
	}

	.login-link{
		text-align:center;
		margin-top:25px;
		font-size:16px;
	}

	.login-link a{
		color:#00c896;
		text-decoration:none;
		font-weight:600;
	}

</style>

</head>
<body>

<div class="register-box">

	<h2 class="register-title">
		ĐĂNG KÝ TÀI KHOẢN
	</h2>

	<form th:action="@{/DustNovel/register}"
		  method="post"
		  th:object="${nguoiDung}">

		<!-- HỌ TÊN -->
		<div class="mb-3">
			<input type="text"
				   th:field="*{hoTen}"
				   class="form-control"
				   placeholder="Họ và tên">
		</div>

		<!-- EMAIL -->
		<div class="mb-3">
			<input type="email"
				   th:field="*{email}"
				   class="form-control"
				   placeholder="Email">
		</div>

		<!-- SỐ ĐIỆN THOẠI -->
		<div class="mb-3">
			<input type="text"
				   th:field="*{soDienThoai}"
				   class="form-control"
				   placeholder="Số điện thoại">
		</div>

		<!-- MẬT KHẨU -->
		<div class="mb-3 password-box">

			<input type="password"
				   th:field="*{matKhau}"
				   id="password"
				   class="form-control"
				   placeholder="Mật khẩu">

			<i class="bi bi-eye"
			   onclick="togglePassword('password')"></i>

		</div>

		<!-- NHẬP LẠI MẬT KHẨU -->
		<div class="mb-4 password-box">

			<input type="password"
				   name="reMatKhau"
				   id="rePassword"
				   class="form-control"
				   placeholder="Nhập lại mật khẩu">

			<i class="bi bi-eye"
			   onclick="togglePassword('rePassword')"></i>

		</div>

		<!-- BUTTON -->
		<div class="d-grid">
			<button type="submit"
					class="btn-register">
				Đăng Ký
			</button>
		</div>

	</form>

	<!-- LOGIN -->
	<div class="login-link">
		Đã có tài khoản ?
		<a th:href="@{/DustNovel/login}">
			Đăng Nhập Ngay
		</a>
	</div>

</div>

<script>

	function togglePassword(id){

		const input =
			document.getElementById(id);

		if(input.type === "password"){
			input.type = "text";
		}else{
			input.type = "password";
		}
	}

</script>

</body>
</html>
