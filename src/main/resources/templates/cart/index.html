<div class="bg-white p-4 rounded shadow-sm">

<h4 class="fw-bold mb-4">
    <i class="bi bi-cart-fill me-2 text-danger"></i>Giỏ hàng của bạn
</h4>

<div th:if="${success}" class="alert alert-success alert-dismissible fade show">
    <span th:text="${success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
<div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

<div th:if="${items.isEmpty()}" class="text-center py-5">
    <i class="bi bi-cart-x fs-1 text-muted"></i>
    <p class="mt-3 text-muted">Giỏ hàng đang trống</p>
    <a th:href="@{/}" class="btn btn-danger">Tiếp tục mua sắm</a>
</div>

<div th:if="${!items.isEmpty()}" class="row g-4">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm">
            <div class="table-responsive">
                <table class="table align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Sản phẩm</th>
                            <th class="text-center">Đơn giá</th>
                            <th class="text-center" style="width:140px">Số lượng</th>
                            <th class="text-end">Thành tiền</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${items}">
                            <td>
                                <span th:text="${item.variant.product.name}"></span>
                                <br>
                                <small class="text-muted" th:text="${item.variant.sku}"></small>
                            </td>
                            <td class="text-center"
                                th:text="${#numbers.formatDecimal(item.variant.price,0,'COMMA',0,'POINT')} + '₫'"></td>
                            <td>
                                <form th:action="@{/cart/update}" method="post"
                                      class="d-flex align-items-center gap-1">
                                    <input type="hidden" name="itemId" th:value="${item.id}">
                                    <input type="number" name="quantity" min="1"
                                           th:value="${item.soLuong}"
                                           class="form-control form-control-sm text-center"
                                           style="width:70px">
                                    <button type="submit" class="btn btn-sm btn-outline-secondary">
                                        <i class="bi bi-arrow-repeat"></i>
                                    </button>
                                </form>
                            </td>
                            <td class="text-end fw-bold text-danger"
                                th:text="${#numbers.formatDecimal(item.thanhTien,0,'COMMA',0,'POINT')} + '₫'"></td>
                            <td>
                                <form th:action="@{/cart/remove}" method="post"
                                      onsubmit="return confirm('Xóa sản phẩm này khỏi giỏ?')">
                                    <input type="hidden" name="itemId" th:value="${item.id}">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <h6 class="fw-bold mb-3">Tóm tắt đơn hàng</h6>
                <div class="d-flex justify-content-between mb-2">
                    <span>Tổng tiền hàng</span>
                    <span class="fw-bold"
                          th:text="${#numbers.formatDecimal(tongTien,0,'COMMA',0,'POINT')} + '₫'"></span>
                </div>
                <small class="text-muted">Phí vận chuyển sẽ tính ở bước thanh toán</small>
                <hr>
                <a th:href="@{/orders/checkout}" class="btn btn-danger w-100">
                    Tiến hành thanh toán
                </a>
            </div>
        </div>
    </div>
</div>

</div>
