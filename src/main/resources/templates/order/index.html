<div class="bg-white p-4 rounded shadow-sm">

<h4 class="fw-bold mb-4">
    <i class="bi bi-bag-check me-2 text-danger"></i>Đơn hàng của tôi
</h4>

<div th:if="${success}" class="alert alert-success alert-dismissible fade show">
    <span th:text="${success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
<div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

<div th:if="${orders.isEmpty()}" class="text-center py-5">
    <i class="bi bi-bag-x fs-1 text-muted"></i>
    <p class="mt-3 text-muted">Bạn chưa có đơn hàng nào</p>
    <a th:href="@{/}" class="btn btn-danger">Mua sắm ngay</a>
</div>

<div th:each="order : ${orders}" class="card mb-3 shadow-sm border-0">
    <div class="card-header d-flex justify-content-between align-items-center bg-white">
        <span class="fw-bold" th:text="'Đơn ' + ${order.maDonHang}"></span>
        <span th:switch="${order.trangThai}">
            <span th:case="'pending'"    class="badge bg-warning text-dark">Chờ xác nhận</span>
            <span th:case="'confirmed'"  class="badge bg-info text-dark">Đã xác nhận</span>
            <span th:case="'processing'" class="badge bg-primary">Đang xử lý</span>
            <span th:case="'shipped'"    class="badge bg-primary">Đang giao</span>
            <span th:case="'delivered'"  class="badge bg-success">Đã giao</span>
            <span th:case="'cancelled'"  class="badge bg-secondary">Đã hủy</span>
            <span th:case="'refunded'"   class="badge bg-dark">Đã hoàn tiền</span>
        </span>
    </div>
    <div class="card-body">
        <div th:each="ct : ${order.chiTiet}" class="d-flex justify-content-between mb-2">
            <span th:text="${ct.tenSanPham} + ' x' + ${ct.soLuong}"></span>
            <span class="fw-bold text-danger"
                  th:text="${#numbers.formatDecimal(ct.thanhTien,0,'COMMA',0,'POINT')} + '₫'"></span>
        </div>
        <hr class="my-2">
        <div class="d-flex justify-content-between">
            <small class="text-muted"
                   th:text="'Ngày đặt: ' + ${#temporals.format(order.createdAt,'dd/MM/yyyy HH:mm')}"></small>
            <div>
                <span class="fw-bold me-3">
                    Tổng: <span class="text-danger"
                                th:text="${#numbers.formatDecimal(order.tongTien,0,'COMMA',0,'POINT')} + '₫'"></span>
                </span>
                <a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-sm btn-outline-danger">
                    Xem chi tiết
                </a>
            </div>
        </div>
    </div>
</div>

</div>
