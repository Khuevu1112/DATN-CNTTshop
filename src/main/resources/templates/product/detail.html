<div class="bg-white p-4 rounded shadow-sm">

    <div class="row">

        <!-- ẢNH SẢN PHẨM -->
        <div class="col-lg-6">

            <img th:if="${product.images != null and !product.images.isEmpty()}"
                 th:src="${product.images[0].url}"
                 class="img-fluid border rounded"
                 style="width:100%; height:420px; object-fit:contain; padding:20px;">

            <img th:if="${product.images == null or product.images.isEmpty()}"
                 src="https://via.placeholder.com/500x500?text=CNTTShop"
                 class="img-fluid border rounded"
                 style="width:100%; height:420px; object-fit:contain; padding:20px;">

            <div class="d-flex gap-2 mt-3"
                 th:if="${product.images != null and !product.images.isEmpty()}">

                <img th:each="img : ${product.images}"
                     th:src="${img.url}"
                     class="border rounded"
                     style="width:80px; height:80px; object-fit:contain; padding:5px;">

            </div>

        </div>

        <!-- THÔNG TIN SẢN PHẨM -->
        <div class="col-lg-6">

            <h2 class="fw-bold" th:text="${product.name}">
                Tên sản phẩm
            </h2>

            <p class="text-muted">
                SKU:
                <span th:if="${product.variants != null and !product.variants.isEmpty()}"
                      th:text="${product.variants[0].sku}">
                </span>
            </p>

            <hr>

            <!-- GIÁ -->
            <h1 class="text-danger fw-bold"
    th:if="${product.variants != null and !product.variants.isEmpty()}"
    th:text="${#numbers.formatDecimal(product.variants[0].price, 0, 'COMMA', 0, 'POINT')} + ' đ'">
    0 đ
</h1>

<div class="text-muted text-decoration-line-through fs-5"
     th:if="${product.variants != null 
             and !product.variants.isEmpty() 
             and product.variants[0].originalPrice != null}"
     th:text="${#numbers.formatDecimal(product.variants[0].originalPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'">
</div>

            <h3 class="text-muted"
                th:if="${product.variants == null or product.variants.isEmpty()}">
                Chưa có giá
            </h3>

            <!-- BANNER KHUYẾN MÃI -->
            <div class="mb-4">
                <div class="alert alert-info mb-0">
                    <strong>
                        🎁 Bạn sẽ nhận được
                    </strong>

                    <ul class="mb-0 mt-2">
                        <li>
                            Mã giảm thêm 200.000đ cho đơn từ 500.000đ.
                        </li>
                        <li>
                            Ưu đãi phụ kiện, phần mềm, bảo hành tùy sản phẩm.
                        </li>
                    </ul>
                </div>
            </div>

            <!-- FORM GIỎ HÀNG / MUA NGAY -->
            <form th:action="@{/cart/add}" method="post">

                <input type="hidden"
                       name="productId"
                       th:value="${product.id}">

                <input type="hidden"
                       name="variantId"
                       th:if="${product.variants != null and !product.variants.isEmpty()}"
                       th:value="${product.variants[0].id}">

                <!-- GHI CHÚ -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Ghi chú quà tặng / yêu cầu khác
                    </label>

                    <textarea name="note"
                              class="form-control"
                              rows="3"
                              placeholder="Nhập yêu cầu của bạn tại đây..."></textarea>
                </div>

                <!-- SỐ LƯỢNG -->
                <div class="mb-4">
                    <label class="form-label fw-semibold">
                        Số lượng
                    </label>

                    <div class="input-group" style="width:160px;">
                        <button type="button"
                                class="btn btn-outline-secondary"
                                onclick="changeQty(-1)">
                            -
                        </button>

                        <input type="number"
                               id="quantity"
                               name="quantity"
                               class="form-control text-center"
                               value="1"
                               min="1">

                        <button type="button"
                                class="btn btn-outline-secondary"
                                onclick="changeQty(1)">
                            +
                        </button>
                    </div>
                </div>

                <!-- NÚT -->
                <div class="row g-3">

                    <div class="col-md-6">
                        <button type="submit"
                                class="btn btn-outline-danger btn-lg w-100 fw-bold">
                            <i class="bi bi-cart-plus me-2"></i>
                            Thêm vào giỏ hàng
                        </button>
                    </div>

                    <div class="col-md-6">
<button type="submit"
        formaction="/cart/add?redirect=checkout"
        class="btn btn-danger btn-lg w-100 fw-bold">
    Mua ngay
</button>
                    </div>

                </div>

            </form>

        </div>

    </div>

    <!-- MÔ TẢ -->
    <div class="mt-5 border rounded p-4 bg-light">

        <h4 class="text-danger fw-bold">
            Mô tả sản phẩm
        </h4>

        <p th:text="${product.description}">
            Mô tả sản phẩm
        </p>

    </div>

    <!-- THÔNG SỐ -->
    <div class="mt-4">

        <h4 class="fw-bold">
            Thông số kỹ thuật
        </h4>

        <table class="table table-bordered mt-3"
               th:if="${product.specs != null and !product.specs.isEmpty()}">

            <tr th:each="s : ${product.specs}">
                <th th:text="${s.specKey}" style="width:30%;">
                    Thông số
                </th>

                <td th:text="${s.specValue}">
                    Giá trị
                </td>
            </tr>

        </table>

        <div th:if="${product.specs == null or product.specs.isEmpty()}"
             class="alert alert-secondary">
            Chưa có thông số kỹ thuật.
        </div>

    </div>

</div>

<script>
function changeQty(value) {
    const input = document.getElementById("quantity");
    let qty = parseInt(input.value);

    qty = qty + value;

    if (qty < 1) {
        qty = 1;
    }

    input.value = qty;
}
</script>
