<div class="mt-3">
    <strong>Thanh toán:</strong>

    <div th:if="${payment != null}">

        <!-- Phương thức -->
        <p class="mb-2">
            <strong>Phương thức:</strong>

            <span class="badge bg-primary"
                  th:text="${payment.paymentMethod.name}">
            </span>
        </p>

        <!-- VNPAY -->
        <div th:if="${payment.status == 'pending'
                    and payment.paymentMethod.code == 'vnpay'}">

            <a th:href="@{/vnpay/pay(paymentId=${payment.id})}"
               class="btn btn-success">

                <i class="bi bi-credit-card me-1"></i>
                Thanh toán ngay

            </a>

        </div>

        <!-- COD -->
        <div th:if="${payment.status == 'pending'
                    and payment.paymentMethod.code == 'cod'}">

            <form th:action="@{/admin/orders/{id}/payment-confirm(id=${order.id})}"
                  method="post">

                <button type="submit"
                        class="btn btn-warning">

                    <i class="bi bi-cash me-1"></i>
                    Xác nhận đã thanh toán

                </button>

            </form>

        </div>

        <!-- Trạng thái -->
        <div class="mt-2">

            <span th:if="${payment.status == 'pending'}"
                  class="badge bg-warning">
                Chờ thanh toán
            </span>

            <span th:if="${payment.status == 'paid'}"
                  class="badge bg-success">
                Đã thanh toán
            </span>

            <span th:if="${payment.status == 'failed'}"
                  class="badge bg-danger">
                Thất bại
            </span>

        </div>

        <!-- Thời gian -->
        <div class="mt-2"
             th:if="${payment.paidAt != null}">

            <small class="text-success">

                Đã thanh toán lúc:
                <span th:text="${#temporals.format(
                        payment.paidAt,
                        'dd/MM/yyyy HH:mm')}">
                </span>

            </small>

        </div>

    </div>

    <div th:if="${payment == null}"
         class="text-muted">

        Chưa có thông tin thanh toán

    </div>

</div>
