<div class="bg-white p-4 rounded shadow-sm">

<h4 class="fw-bold mb-4">
    <i class="bi bi-credit-card me-2 text-danger"></i>Xác nhận đặt hàng
</h4>

<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

<form th:action="@{/orders/place}" method="post">

<div class="row g-4">
    <div class="col-md-7">
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-header bg-white fw-bold">Chọn địa chỉ giao hàng</div>
            <div class="card-body">

                <div th:if="${addresses.isEmpty()}" class="text-center py-3">
                    <p class="text-muted">Bạn chưa có địa chỉ nào</p>
                    <a th:href="@{/account/addresses/new(returnUrl='/orders/checkout')}" class="btn btn-outline-danger">
                        Thêm địa chỉ
                    </a>
                </div>

                <div th:each="addr, iter : ${addresses}" class="form-check border rounded p-3 mb-2">
                    <input class="form-check-input" type="radio" name="addressId"
                           th:value="${addr.id}" th:id="'addr-' + ${addr.id}"
                           th:checked="${addr.isDefault} or ${iter.first}">
                    <label class="form-check-label w-100" th:for="'addr-' + ${addr.id}">
                        <strong th:text="${addr.tenNguoiNhan}"></strong>
                        <span class="text-muted"> - </span>
                        <span th:text="${addr.soDienThoai}"></span>
                        <br>
                        <span th:text="${addr.diaChiDayDu}"></span>
                        <span th:if="${addr.isDefault}" class="badge bg-danger ms-2">Mặc định</span>
                    </label>
                </div>

                <a th:href="@{/account/addresses/new(returnUrl='/orders/checkout')}" class="btn btn-sm btn-outline-secondary mt-2">
                    <i class="bi bi-plus-lg me-1"></i>Thêm địa chỉ mới
                </a>
            </div>
        </div>
    </div>

    <div class="col-md-5">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white fw-bold">Đơn hàng của bạn</div>
            <div class="card-body">
                <div th:each="item : ${items}" class="d-flex justify-content-between mb-2">
                    <span th:text="${item.variant.product.name} + ' x' + ${item.soLuong}"></span>
                    <span th:text="${#numbers.formatDecimal(item.thanhTien,0,'COMMA',0,'POINT')} + '₫'"></span>
                </div>
                <hr>
                <div class="d-flex justify-content-between mb-2">
                    <span>Tiền hàng</span>
                    <span th:text="${#numbers.formatDecimal(tongTienHang,0,'COMMA',0,'POINT')} + '₫'"></span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span>Phí vận chuyển</span>
                    <span>30.000₫</span>
                </div>
                <hr>
                <div class="d-flex justify-content-between fw-bold fs-5">
                    <span>Tổng cộng</span>
                    <span class="text-danger"
                          th:text="${#numbers.formatDecimal(tongTienHang.add(new java.math.BigDecimal('30000')),0,'COMMA',0,'POINT')} + '₫'"></span>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Phương thức thanh toán</label>

                    <select name="paymentMethodId" class="form-select" required>
                        <option value="1">Thanh toán khi nhận hàng (COD)</option>
                        <option value="2">VNPay</option>
                        <option value="3">MoMo</option>
                        <option value="4">Chuyển khoản ngân hàng</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-danger w-100 mt-3"
                        th:disabled="${addresses.isEmpty()}">
                    Đặt hàng
                </button>
            </div>
        </div>
    </div>
</div>

</form>

</div>
